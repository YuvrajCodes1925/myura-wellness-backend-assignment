services:
  - type: web
    name: myura-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://myura-frontend.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: REQUIRE_ADMIN_AUTH
        value: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false